<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Summarizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      width: 100%;
      max-width: 100%;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow-x: hidden;
      color: #1a1a1a;
      background: #fff;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 5;
    }
    .panel-header h1 { font-size: 17px; margin: 0; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 18px; padding: 4px 8px; border-radius: 6px; line-height: 1;
    }
    .icon-btn:hover { background: #f0f0f0; }

    section { padding: 16px; }

    .hint { color: #777; font-size: 13px; margin-top: 14px; line-height: 1.6; }

    .summary-status { margin-top: 14px; font-size: 13px; color: #555; min-height: 0; }
    .summary-status.error {
      background: #ffebee; color: #c62828; padding: 10px 12px;
      border-radius: 6px; border-left: 4px solid #c62828;
    }
    .summary-status .loader { display: inline-flex; gap: 6px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #667eea; animation: bounce 1.4s infinite ease-in-out both; }
    .dot:nth-child(1){animation-delay:-.32s} .dot:nth-child(2){animation-delay:-.16s}
    @keyframes bounce { 0%,80%,100%{transform:scale(0);opacity:.5} 40%{transform:scale(1);opacity:1} }

    .source-note { font-size: 12px; color: #888; font-style: italic; margin: 0 0 12px; }

    .summary-body { margin-top: 16px; font-size: 14px; line-height: 1.7; color: #222; }
    .summary-body h1, .summary-body h2, .summary-body h3 { font-size: 15px; margin: 18px 0 8px; }
    .summary-body h2 { font-size: 16px; }
    .summary-body h1:first-child, .summary-body h2:first-child { margin-top: 0; }
    .summary-body ul, .summary-body ol { margin: 8px 0; padding-left: 22px; }
    .summary-body li { margin: 5px 0; }
    .summary-body p { margin: 10px 0; }
    .summary-body code { background: #f3f3f3; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    .summary-body a { color: #1976d2; }

    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #555; font-size: 13px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 9px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;
    }
    input:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 2px rgba(25,118,210,.1); }
    .help-text { font-size: 12px; color: #666; margin-top: 6px; }
    a { color: #1976d2; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #saveBtn { width: 100%; background: #1976d2; color: #fff; border: none; padding: 10px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
    #saveBtn:hover { background: #1565c0; }

    .status { margin-top: 12px; padding: 9px 11px; border-radius: 6px; font-size: 13px; display: none; }
    .status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status.error { background: #ffebee; color: #c62828; display: block; }

    .dark-mode-toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 12px; background: #f5f5f5; border-radius: 8px; }
    .dark-mode-toggle label { margin: 0; cursor: pointer; }
    .toggle-switch { position: relative; width: 46px; height: 24px; background: #ccc; border-radius: 12px; cursor: pointer; transition: background-color .3s; flex-shrink: 0; }
    .toggle-switch.active { background: #1976d2; }
    .toggle-switch::after { content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; top:2px; left:2px; transition: transform .3s; box-shadow: 0 2px 4px rgba(0,0,0,.2); }
    .toggle-switch.active::after { transform: translateX(22px); }

    /* Chat */
    .chat-divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }
    .chat-messages { display: flex; flex-direction: column; gap: 10px; }
    .chat-bubble { padding: 9px 12px; border-radius: 10px; font-size: 13px; line-height: 1.6; max-width: 88%; word-break: break-word; display: flex; flex-direction: column; }
    .chat-copy-btn { align-self: flex-start; margin-top: 7px; background: rgba(0,0,0,.08); color: inherit; border: none; font: inherit; font-size: 11px; line-height: 1; padding: 4px 9px; border-radius: 5px; cursor: pointer; opacity: .65; transition: opacity .15s, background-color .15s; }
    .chat-copy-btn:hover { opacity: 1; }
    .chat-copy-btn.copied { background: #2e7d32; color: #fff; opacity: 1; }
    .chat-bubble-user .chat-copy-btn { align-self: flex-end; background: rgba(255,255,255,.25); color: #fff; }
    .chat-bubble-empty .chat-copy-btn { display: none; }
    body.dark-mode .chat-copy-btn { background: rgba(255,255,255,.12); }
    body.dark-mode .chat-copy-btn.copied { background: #2e7d32; }
    .chat-bubble-user { align-self: flex-end; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-bottom-right-radius: 3px; }
    .chat-bubble-model { align-self: flex-start; background: #f3f4f6; color: #222; border-bottom-left-radius: 3px; }
    .chat-bubble-model h1, .chat-bubble-model h2, .chat-bubble-model h3 { font-size: 13px; font-weight: 600; margin: 6px 0 3px; }
    .chat-bubble-model h1:first-child, .chat-bubble-model h2:first-child, .chat-bubble-model h3:first-child { margin-top: 0; }
    .chat-bubble-model ul, .chat-bubble-model ol { margin: 4px 0; padding-left: 16px; }
    .chat-bubble-model li { margin: 2px 0; }
    .chat-bubble-model p { margin: 4px 0; }
    .chat-bubble-model p:first-child { margin-top: 0; }
    .chat-bubble-model p:last-child { margin-bottom: 0; }
    .chat-bubble-model code { background: rgba(0,0,0,.07); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .chat-bubble-model a { color: #1976d2; }
    .chat-bubble-empty { min-width: 36px; min-height: 22px; }
    .chat-input-row { display: flex; gap: 8px; align-items: flex-end; margin-top: 12px; }
    .chat-input { flex: 1; padding: 9px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: inherit; resize: none; min-height: 38px; max-height: 120px; overflow-y: auto; line-height: 1.5; }
    .chat-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,.15); }
    .chat-send-btn { background: #667eea; color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: opacity .2s; }
    .chat-send-btn:hover { opacity: .88; }
    .chat-send-btn.stop { background: #c62828; }
    .chat-send-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Chat-active sticky layout */
    .view-top { padding: 16px; }
    body.chat-active { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    /* :not([hidden]) so the chat-active flex layout never resurrects a view that
       was hidden (e.g. summaryView while Settings is open). */
    body.chat-active section#summaryView:not([hidden]) { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0; }
    body.chat-active #chatSection { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    /* The header already carries a bottom border; drop the divider's line + margin
       so the chat starts flush under the title instead of after a blank gap. */
    body.chat-active .chat-divider { display: none; }
    #chatMessages { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .chat-input-area { flex-shrink: 0; padding: 8px 16px 16px; background: #fff; }
    .chat-summarize-btn {
      display: block; width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; border: none; padding: 10px 16px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s;
      margin-bottom: 8px;
    }
    .chat-summarize-btn:hover { opacity: .92; }
    /* `display:block` above would otherwise beat the UA [hidden] rule, leaving the
       button on screen even when JS sets the hidden attribute. Make hidden win. */
    .chat-summarize-btn[hidden] { display: none; }
    .transcript-pill {
      display: inline-flex; gap: 4px; align-items: center;
      background: rgba(255,255,255,.2); border-radius: 6px;
      padding: 4px 10px; font-size: 12px; font-weight: 500;
    }

    /* Dark mode */
    body.dark-mode { background: #1e1e1e; color: #e0e0e0; }
    body.dark-mode .panel-header { background: #1e1e1e; border-bottom-color: #333; }
    body.dark-mode .icon-btn:hover { background: #2d2d2d; }
    body.dark-mode .summary-body { color: #e0e0e0; }
    body.dark-mode .summary-body code { background: #2d2d2d; }
    body.dark-mode .summary-body a, body.dark-mode a { color: #64b5f6; }
    body.dark-mode label { color: #b0b0b0; }
    body.dark-mode input[type="text"], body.dark-mode input[type="password"] { background: #2d2d2d; border-color: #444; color: #e0e0e0; }
    body.dark-mode .dark-mode-toggle { background: #2d2d2d; }
    body.dark-mode .help-text { color: #888; }
    body.dark-mode .hint, body.dark-mode .summary-status { color: #aaa; }
    body.dark-mode .chat-divider { border-top-color: #333; }
    body.dark-mode .chat-bubble-model { background: #2d2d2d; color: #e0e0e0; }
    body.dark-mode .chat-bubble-model code { background: rgba(255,255,255,.1); }
    body.dark-mode .chat-bubble-model a { color: #64b5f6; }
    body.dark-mode .chat-input { background: #2d2d2d; border-color: #444; color: #e0e0e0; }
    body.dark-mode .chat-input-area { background: #1e1e1e; }
  </style>
</head>

<body>
  <div class="panel-header">
    <h1 id="panelTitle">📝 Summarizer</h1>
    <button id="settingsToggle" class="icon-btn" title="Settings" aria-label="Settings">⚙️</button>
  </div>

  <section id="summaryView">
    <div id="viewTop" class="view-top">
      <div id="summaryStatus" class="summary-status"></div>
      <div id="summaryBody" class="summary-body"></div>
      <p id="idleHint" class="hint">
        Open a YouTube video — the transcript loads automatically. You can also use the
        <strong>📝 Summarize</strong> button on any thumbnail in your feed.
      </p>
    </div>
    <div id="chatSection" hidden>
      <div class="chat-divider"></div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-area" id="chatInputArea">
        <button id="summarizeForChatBtn" class="chat-summarize-btn" hidden>Summarize</button>
        <div class="chat-input-row">
          <textarea id="chatInput" class="chat-input" placeholder="Ask about this video…" aria-label="Ask about this video" rows="1"></textarea>
          <button id="chatSendBtn" class="chat-send-btn">Send</button>
        </div>
      </div>
    </div>
  </section>

  <section id="settingsView" hidden>
    <div class="dark-mode-toggle">
      <label for="darkModeToggle">Dark Mode</label>
      <div id="darkModeToggle" class="toggle-switch" role="switch" tabindex="0"></div>
    </div>
    <div class="form-group">
      <label for="apiKey">Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your Google Gemini API key" autocomplete="off">
      <div class="help-text">
        Get a free key from
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
        Stored only in your browser.
      </div>
    </div>
    <button id="saveBtn">Save API Key</button>
    <div id="status" class="status"></div>
  </section>

  <script src="popup.js"></script>
</body>

</html>
